<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypercare Automation</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 360px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .log-list { flex: 1; overflow-y: auto; padding: 8px; }
  .log-item {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .log-item:hover { background: rgba(108,99,255,0.08); }
  .log-item.ok { border-left-color: var(--green); }
  .log-item.partial { border-left-color: var(--yellow); }
  .log-item.error { border-left-color: var(--red); }
  .log-item.running { border-left-color: var(--blue); }
  .log-item .log-top { display: flex; justify-content: space-between; align-items: center; }
  .log-item .log-id { font-size: 12px; color: var(--muted); font-family: monospace; }
  .log-item .log-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .log-badge.ok { background: rgba(52,211,153,0.15); color: var(--green); }
  .log-badge.partial { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .log-badge.error { background: rgba(248,113,113,0.15); color: var(--red); }
  .log-badge.running { background: rgba(96,165,250,0.15); color: var(--blue); }
  .log-item .log-msg { font-size: 13px; margin-top: 4px; color: var(--text); }
  .log-item .log-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .log-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  .content { padding: 32px; max-width: 720px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 12px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: #555; }

  .btn {
    margin-top: 24px; padding: 12px 32px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.98); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 8px; font-size: 14px;
    transform: translateY(80px); opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
  .toast.info { background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.3); color: var(--blue); }
  .toast.error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

  .detail-panel {
    margin-top: 20px; padding: 16px; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--border);
    display: none; font-size: 13px;
  }
  .detail-panel h3 { font-size: 14px; margin-bottom: 8px; }
  .detail-panel .detail-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; margin-bottom: 12px; }
  .detail-panel .detail-label { color: var(--muted); font-size: 12px; }
  .detail-panel .detail-val { font-size: 13px; }
  .detail-panel pre { white-space: pre-wrap; color: var(--muted); font-size: 12px; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">Run History</div>
  <div class="log-list" id="logList">
    <div class="log-empty" id="logEmpty">No runs yet</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="dot" id="healthDot"></div>
    <h1>Hypercare Automation</h1>
  </div>
  <div class="content">
    <div class="form-grid">
      <div class="form-group">
        <label>Mojo Client ID</label>
        <input id="mojo_client_id" placeholder="e.g. e7a4dc28-..." />
      </div>
      <div class="form-group">
        <label>Google Sheet ID</label>
        <input id="google_sheet_id" placeholder="spreadsheet ID" />
      </div>
      <div class="form-group">
        <label>Agency ID</label>
        <input id="agency_id" placeholder="e.g. ashleyfurniture" />
      </div>
      <div class="form-group">
        <label>Account ID</label>
        <input id="account_id" placeholder="e.g. ashleyfurniture" />
      </div>
      <div class="form-group">
        <label>Mojo Email</label>
        <input id="mojo_email" type="email" placeholder="you@joveo.com" />
      </div>
      <div class="form-group">
        <label>Mojo Username</label>
        <input id="mojo_username" placeholder="(defaults to email)" />
      </div>
      <div class="form-group">
        <label>Run Date</label>
        <input id="run_date" type="date" />
      </div>
      <div class="form-group"><label>&nbsp;</label></div>
      <div class="form-group full">
        <label>Mojo Access Token</label>
        <input id="mojo_access_token" placeholder="eyJraWQi..." />
      </div>
    </div>
    <button class="btn" onclick="submitRun()">Run Hypercare</button>
    <div class="detail-panel" id="detailPanel">
      <h3 id="detailTitle">Run Details</h3>
      <div class="detail-grid" id="detailGrid"></div>
      <pre id="detailErrors"></pre>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5050';
const fields = [
  'mojo_client_id','google_sheet_id','agency_id','account_id',
  'mojo_email','mojo_username','mojo_access_token','run_date'
];

// Track run_ids that are still "running" so we can poll them
const pendingRuns = new Set();

function showToast(msg, type, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), duration || 3000);
}

async function submitRun() {
  const body = {};
  fields.forEach(f => { body[f] = document.getElementById(f).value; });

  // Clear form immediately
  fields.forEach(f => { document.getElementById(f).value = ''; });

  try {
    const resp = await fetch(`${API}/api/run`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    showToast(`Run #${data.run_id} queued — ${data.job_date}`, 'info');
    pendingRuns.add(data.run_id);
    refreshLogs();
  } catch (e) {
    showToast(`Failed to submit: ${e.message}`, 'error', 5000);
  }
}

function showDetail(entry) {
  const panel = document.getElementById('detailPanel');
  const grid = document.getElementById('detailGrid');
  const errs = document.getElementById('detailErrors');
  const title = document.getElementById('detailTitle');

  title.textContent = `Run #${entry.run_id || '?'}`;
  const pairs = [
    ['Status', entry.status],
    ['Message', entry.message],
    ['Job Date', entry.job_date],
    ['Report Date', entry.report_date],
    ['Started', (entry.started_at || '').replace('T',' ').slice(0,19)],
    ['Finished', entry.finished_at ? entry.finished_at.replace('T',' ').slice(0,19) : '—'],
    ['Sheet', entry.spreadsheet_id || '—'],
  ];
  grid.innerHTML = pairs.map(([l,v]) =>
    `<div class="detail-label">${l}</div><div class="detail-val">${v||'—'}</div>`
  ).join('');

  const errText = (entry.errors || []).join('\n') + (entry.traceback ? '\n\n' + entry.traceback : '');
  errs.textContent = errText.trim();
  panel.style.display = 'block';
}

async function refreshLogs() {
  try {
    const resp = await fetch(`${API}/api/logs`);
    const logs = await resp.json();
    const list = document.getElementById('logList');
    const empty = document.getElementById('logEmpty');
    if (!logs.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    // Check which pending runs have finished
    for (const rid of [...pendingRuns]) {
      const entry = logs.find(l => l.run_id === rid);
      if (entry && entry.status !== 'running') {
        pendingRuns.delete(rid);
        const icon = entry.status === 'ok' ? '✓' : entry.status === 'partial' ? '⚠' : '✗';
        showToast(`${icon} Run #${rid} finished: ${entry.message || entry.status}`,
          entry.status === 'ok' ? 'ok' : 'error', 4000);
      }
    }

    list.innerHTML = logs.map(l => {
      const s = l.status || 'error';
      const dateStr = l.finished_at
        ? l.finished_at.replace('T',' ').slice(0,19)
        : 'in progress...';
      return `
        <div class="log-item ${s}" onclick='showDetail(${JSON.stringify(l)})'>
          <div class="log-top">
            <span class="log-id">#${l.run_id || '?'} &middot; ${l.job_date || ''}</span>
            <span class="log-badge ${s}">${s === 'running' ? '● running' : s}</span>
          </div>
          <div class="log-msg">${l.message || ''}</div>
          <div class="log-date">${dateStr}</div>
        </div>`;
    }).join('');
  } catch(e) {}
}

async function checkHealth() {
  const dot = document.getElementById('healthDot');
  try {
    const r = await fetch(`${API}/api/health`);
    dot.style.background = r.ok ? 'var(--green)' : 'var(--red)';
  } catch { dot.style.background = 'var(--red)'; }
}

checkHealth();
refreshLogs();
document.getElementById('run_date').max = new Date().toISOString().split('T')[0];
setInterval(checkHealth, 10000);
// Poll logs frequently while there are pending runs, otherwise slower
setInterval(() => {
  refreshLogs();
}, pendingRuns.size > 0 ? 2000 : 5000);
// Also poll fast unconditionally for a smooth UX
setInterval(refreshLogs, 2000);
</script>
</body>
</html>
